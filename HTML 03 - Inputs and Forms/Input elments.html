<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Elments</title>
</head>
<body>
  <form action="/server">
    <input type="checkbox" name="age" id="age">
    <label for="age">I am 18+</label>
    <div>
      Fruit
      <input type="radio" name="fruit" id="apple" value="apple">
      <label for="apple">Apple</label>
      <input type="radio" name="fruit" id="mango" value="mango">
      <label for="mango">Mango</label>
      <input type="radio" name="fruit" id="orange" value="orange">
      <label for="orange">Orange</label>
    </div>
    <div>
      Favorite FML
      <input type="checkbox" name="FML" id="Nephis" value="Nephis">
      <label for="Nephis">Nephis</label>
      <input type="checkbox" name="FML" id="Yanyan" value="Yanyan">
      <label for="Yanyan">Yanyan</label>
      <input type="checkbox" name="FML" id="Honami" value="Honami">
      <label for="Honami">Honami</label>
    </div>
    <div>
      Choose your Cast
      <select name="Cast" id="Cast">
        <option>Select your option</option>
        <option value="Male lead"="">Male lead</option>
        <option value="Female lead">Female lead</option>
        <option value="Villain">Villain</option>
        <option value="Villainess">Villainess</option>
      </select>
    </div>
    <div>
      <label for="vol">Volume</label>
      <input type="range" id="vol" min="0" max="100" name="vol" step="10" value="30">
    </div>
    <div>
      <label for="feedback">Please leave your feedback:</label>
      <textarea id="feedback" name="feedback" rows="5" cols="100" placeholder="write feedback"></textarea>
    </div>
    <button>Submit</button>
  </form>
  <hr>
  
  <form action="/action">
    <h2>Registration Form</h2>
    <div>
      <input type="text" id="first "placeholder="First Name" name="first">
      <input type="text" id="last" placeholder="Last Name" name="last">
      <label for="gender">Please select gender</label>
      <select name="gen" id="gender">
        <option value="m">Male</option>
        <option value="f">Female</option>
        <option value="o">Others</option>
      </select>
      <br>
      Do you agree to all the terms of sevice?
      <input type="checkbox" name="terms" id="terms">
      <label for="terms">Yes, I agree</label>
    </div>
    <button>Submit</button>
  </form>
</body>
</html>
