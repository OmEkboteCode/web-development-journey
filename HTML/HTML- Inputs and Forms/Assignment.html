    <form action="/server">
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="user">
      </div>
      <div>
        Sex:
        <input type="radio" name="sex" id="male" value="m">
        <label for="male">male</label>
        <input type="radio" name="sex" id="female" value="f">
        <label for="female">female</label>
      </div>
      <div>
        Country:
        <select name="country" id="country">
        <option value="select">Select an option</option>
        <option value="ind">India</option>
        <option value="USA">USA</option>
        </select>
      </div>
      <div>
        <label for="message">Message:</label> <br>
        <textarea id="message" name="message" rows="4"cols="30"></textarea>
      </div>
      <div>
        <input type="checkbox" name="sub" id="sub">
        <label for="sub">Subscribe?</label>
      </div>
      <button>Submit</button>
    </form>
    <hr>
    <form action="/server">
      <h2>Feedback Form</h2>
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="user" placeholder="Write your name">
        <br>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Write your email">        
        <br>
        <label for="message">Message:</label> <br>
        <textarea id="message" name="message" rows="4"cols="30"></textarea>
        <br>
        Rate us out of 5:<br>
        <input type="radio" name="rate" id="1" value="1">
        <label for="1">1</label><br>
        <input type="radio" name="rate" id="2" value="2">
        <label for="2">2</label><br>
        <input type="radio" name="rate" id="3" value="3">
        <label for="3">3</label><br>
        <input type="radio" name="rate" id="4" value="4">
        <label for="4">4</label><br>
        <input type="radio" name="rate" id="5" value="5">
        <label for="5">5</label><br>
      </div>
      <button>Send your message</button>
    </form>
